<!DOCTYPE html>    
<html lang="ar">    
<head>    
  <meta charset="UTF-8">    
  <title>الرسم البياني الاحترافي</title>    
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>    
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>    
  <style>    
    body {    
      direction: rtl;    
      font-family: Arial;    
      text-align: center;    
      background: #f0f0f0;    
    }    
    canvas {    
      background: linear-gradient(to top, rgba(255, 0, 0, 0.15) 50%, rgba(0, 255, 0, 0.15) 50%);    
      border: 1px solid #ccc;    
      margin: 20px auto;    
      display: block;    
    }    
    select, input[type=text], button {    
      padding: 10px;    
      margin: 10px;    
      font-size: 16px;    
    }    
    #priceLabel {    
      font-size: 20px;    
      color: #000;    
      margin-top: -10px;    
    }    
    table {    
      margin: 20px auto;    
      border-collapse: collapse;    
      width: 90%;    
    }    
    th, td {    
      border: 1px solid #ccc;    
      padding: 8px;    
      font-size: 14px;    
    }    
    th {    
      background-color: #333;    
      color: white;    
    }    
    .buy {    
      background-color: rgba(0, 255, 0, 0.2);    
    }    
    .sell {    
      background-color: rgba(255, 0, 0, 0.2);    
    }    
    .trend-up { color: green; }    
    .trend-down { color: red; }    
    #alert {    
      font-size: 18px;    
      font-weight: bold;    
      margin: 10px;    
      padding: 10px;    
      border-radius: 5px;    
    }    
    .alert-bullish {    
      background-color: rgba(0, 255, 0, 0.3);    
      color: green;    
    }    
  </style>    
</head>    
<body>    
  <button onclick="toggleLang()">ENGLISH</button>    
  <h2 id="title">الرسم البياني للعملة</h2>    
  <input type="text" id="symbol" placeholder="مثال: BTC" />    
  <select id="interval" onchange="fetchChart()">    
    <option value="1m">1 دقيقة</option>    
    <option value="15m">15 دقيقة</option>    
    <option value="1h" selected>1 ساعة</option>    
    <option value="4h">4 ساعات</option>    
    <option value="1d">1 يوم</option>    
  </select>    
  <button onclick="fetchChart()" id="searchBtn">بحث</button>    
  <div id="priceLabel">السعر الحالي: --</div>    
  <div id="alert"></div>    
  <canvas id="chart" width="900" height="400"></canvas>    
  <div id="breakout"></div>    
  <h3 id="pressureTitle">نسبة ضغط الشراء والبيع</h3>    
  <div id="pressure"></div>    
  <h3 id="orderbookTitle">إجمالي المشترين والبائعين</h3>    
  <div id="orderbook"></div>    
  <h3 id="ratiosTitle">نسبة الشراء والبيع (٪)</h3>    
  <div id="ratios"></div>    
  <h3 id="breakoutCoinsTitle">العملات التي اخترقت خط التشبع البيعي</h3>    
  <div id="breakoutCoins"></div>    
    
  <script>    
    let chart;    
    let currentPair = 'BTCUSDT';    
    let isEnglish = false;    
    let updateInterval;    
    let breakoutCoins = JSON.parse(localStorage.getItem('breakoutCoins')) || [];    
    let lastPrice = null;    
    
    const lang = {    
      ar: {    
        title: "الرسم البياني للعملة",    
        search: "بحث",    
        currentPrice: "السعر الحالي: ",    
        orderbookTitle: "إجمالي المشترين والبائعين",    
        ratiosTitle: "نسبة الشراء والبيع (٪)",    
        breakoutCoinsTitle: "العملات التي اخترقت خط التشبع البيعي",    
        pressureTitle: "نسبة ضغط الشراء والبيع",    
        buyPressure: "ضغط الشراء: ",    
        sellPressure: "ضغط البيع: ",    
        coin: "العملة",    
        price: "السعر",    
        action: "إجراء",    
        delete: "حذف",    
        favorite: "إضافة إلى المفضلة",    
        unfavorite: "إزالة من المفضلة",    
        example: "مثال: BTC",    
        breakout: "نسبة الاختراق: ",    
        trendUp: "السعر في ارتفاع",    
        trendDown: "السعر في هبوط",    
        bullishAlert: "إشارة صعودية: ضغط الشراء مرتفع جدًا أثناء الهبوط، السعر قد يرتفع قريبًا! ↑"    
      },    
      en: {    
        title: "Crypto Chart",    
        search: "Search",    
        currentPrice: "Current Price: ",    
        orderbookTitle: "Total Buyers and Sellers",    
        ratiosTitle: "Buy/Sell Ratio (%)",    
        breakoutCoinsTitle: "Coins Breaking Oversold Line",    
        pressureTitle: "Buy and Sell Pressure Ratio",    
        buyPressure: "Buy Pressure: ",    
        sellPressure: "Sell Pressure: ",    
        coin: "Coin",    
        price: "Price",    
        action: "Action",    
        delete: "Delete",    
        favorite: "Add to Favorites",    
        unfavorite: "Remove from Favorites",    
        example: "Example: BTC",    
        breakout: "Breakout Ratio: ",    
        trendUp: "Price is Rising",    
        trendDown: "Price is Falling",    
        bullishAlert: "Bullish Signal: High Buy Pressure During Downtrend, Price May Rise Soon! ↑"    
      }    
    };    
    
    function toggleLang() {    
      isEnglish = !isEnglish;    
      const l = isEnglish ? lang.en : lang.ar;    
      document.body.dir = isEnglish ? "ltr" : "rtl";    
      document.getElementById("title").innerText = l.title;    
      document.getElementById("searchBtn").innerText = l.search;    
      document.getElementById("orderbookTitle").innerText = l.orderbookTitle;    
      document.getElementById("ratiosTitle").innerText = l.ratiosTitle;    
      document.getElementById("breakoutCoinsTitle").innerText = l.breakoutCoinsTitle;    
      document.getElementById("pressureTitle").innerText = l.pressureTitle;    
      document.getElementById("symbol").placeholder = l.example;    
      fetchChart();    
      updateBreakoutCoinsTable();    
    }    
    
    async function fetchChart() {    
      const symbolInput = document.getElementById("symbol").value.toUpperCase() || "BTC";    
      const interval = document.getElementById("interval").value;    
      currentPair = symbolInput.endsWith("USDT") ? symbolInput : symbolInput + "USDT";    
    
      try {    
        const res = await fetch(`https://api.binance.com/api/v1/klines?symbol=${currentPair}&interval=${interval}&limit=100`);    
        const data = await res.json();    
    
        const labels = data.map(d => new Date(d[0]).toLocaleTimeString());    
        const prices = data.map(d => parseFloat(d[4]));    
        const volumes = data.map(d => parseFloat(d[5]));    
        const currentPrice = prices[prices.length - 1];    
        const previousPrice = prices[prices.length - 2] || currentPrice;    
        const currentVolume = volumes[volumes.length - 1];    
        const avgVolume = volumes.slice(-10).reduce((sum, v) => sum + v, 0) / 10;    
        const trend = currentPrice > previousPrice ? 'trend-up' : 'trend-down';    
        const trendText = currentPrice > previousPrice ? (isEnglish ? lang.en.trendUp : lang.ar.trendUp) : (isEnglish ? lang.en.trendDown : lang.ar.trendDown);    
    
        document.getElementById("priceLabel").innerHTML = (isEnglish ? lang.en.currentPrice : lang.ar.currentPrice) + currentPrice + ` <span class="${trend}">[${trendText}]</span>`;    
    
        const maxPrice = Math.max(...prices);    
        const minPrice = Math.min(...prices);    
        const range = Math.max(maxPrice - minPrice, 0.0001);    
        const overbought = minPrice + range * 0.9;    
        const oversold = minPrice;    
    
        let breakoutText = "";    
        if (currentPrice > overbought) {    
          const ratio = ((currentPrice - overbought) / overbought * 100).toFixed(2);    
          breakoutText = (isEnglish ? lang.en.breakout : lang.ar.breakout) + ratio + "% " + (isEnglish ? "(Overbought)" : "(تشبع شرائي)");    
        } else if (currentPrice < oversold) {    
          const ratio = ((oversold - currentPrice) / oversold * 100).toFixed(2);    
          breakoutText = (isEnglish ? lang.en.breakout : lang.ar.breakout) + ratio + "% " + (isEnglish ? "(Oversold)" : "(تشبع بيعي)");    
        }    
        document.getElementById("breakout").innerText = breakoutText;    
    
        const annotations = {    
          priceLine: {    
            type: 'line',    
            yMin: currentPrice,    
            yMax: currentPrice,    
            borderColor: 'black',    
            borderWidth: 2,    
            label: {    
              content: currentPrice,    
              enabled: true,    
              position: 'start'    
            }    
          },    
          overboughtLine: {    
            type: 'line',    
            yMin: overbought,    
            yMax: overbought,    
            borderColor: 'green',    
            borderWidth: 1,    
            borderDash: [5, 5],    
            label: {    
              content: isEnglish ? 'Overbought' : 'تشبع شرائي',    
              enabled: true,    
              position: 'start'    
            }    
          },    
          oversoldLine: {    
            type: 'line',    
            yMin: oversold,    
            yMax: oversold,    
            borderColor: 'red',    
            borderWidth: 1,    
            borderDash: [5, 5],    
            label: {    
              content: isEnglish ? 'Oversold' : 'تشبع بيعي',    
              enabled: true,    
              position: 'start'    
            }    
          }    
        };    
    
        if (chart) {    
          chart.data.labels = labels;    
          chart.data.datasets[0].data = prices;    
          chart.options.plugins.annotation.annotations = annotations;    
          chart.update();    
        } else {    
          chart = new Chart(document.getElementById("chart").getContext("2d"), {    
            type: 'line',    
            data: {    
              labels: labels,    
              datasets: [{    
                label: 'Price',    
                data: prices,    
                borderColor: 'blue',    
                pointBackgroundColor: prices.map(p => p >= currentPrice ? 'green' : 'red'),    
                fill: false,    
                tension: 0.3    
              }]    
            },    
            options: {    
              responsive: true,    
              scales: {    
                y: {    
                  beginAtZero: false    
                }    
              },    
              plugins: {    
                annotation: {    
                  annotations: annotations    
                }    
              }    
            }    
          });    
        }    
    
        fetchOrderBookTotal(currentPair, currentPrice, previousPrice, currentVolume, avgVolume);    
        fetchRatios(currentPair);    
        lastPrice = currentPrice;    
      } catch (err) {    
        console.error("خطأ في جلب البيانات:", err);    
      }    
    }    
    
    async function fetchOrderBookTotal(pair, currentPrice, previousPrice, currentVolume, avgVolume) {    
      try {    
        const resOrder = await fetch(`https://api.binance.com/api/v3/depth?symbol=${pair}&limit=100`);    
        const dataOrder = await resOrder.json();    
        const resTrades = await fetch(`https://api.binance.com/api/v3/trades?symbol=${pair}&limit=50`);    
        const dataTrades = await resTrades.json();    
    
        const totalBuy = dataOrder.bids.reduce((sum, b) => sum + parseFloat(b[1]), 0);    
        const totalSell = dataOrder.asks.reduce((sum, a) => sum + parseFloat(a[1]), 0);    
    
        const buyText = (isEnglish ? "Total Buy Quantity: " : "إجمالي كمية الشراء: ") + totalBuy.toFixed(2);    
        const sellText = (isEnglish ? "Total Sell Quantity: " : "إجمالي كمية البيع: ") + totalSell.toFixed(2);    
    
        document.getElementById("orderbook").innerHTML = `<div class="buy">${buyText}</div><div class="sell">${sellText}</div>`;    
    
        const buyPressureOrder = dataOrder.bids    
          .filter(b => parseFloat(b[0]) <= currentPrice)    
          .reduce((sum, b) => sum + parseFloat(b[1]), 0);    
        const sellPressureOrder = dataOrder.asks    
          .filter(a => parseFloat(a[0]) >= currentPrice)    
          .reduce((sum, a) => sum + parseFloat(a[1]), 0);    
        const totalPressureOrder = buyPressureOrder + sellPressureOrder || 1;    
    
        const buyTrades = dataTrades.filter(t => t.isBuyerMaker === false).reduce((sum, t) => sum + parseFloat(t.qty), 0);    
        const sellTrades = dataTrades.filter(t => t.isBuyerMaker === true).reduce((sum, t) => sum + parseFloat(t.qty), 0);    
        const totalTrades = buyTrades + sellTrades || 1;    
    
        const volumeWeight = currentVolume / avgVolume;    
        const buyPressure = (buyPressureOrder * 0.6 + buyTrades * 0.4) * volumeWeight;    
        const sellPressure = (sellPressureOrder * 0.6 + sellTrades * 0.4) * volumeWeight;    
        const totalPressure = buyPressure + sellPressure || 1;    
    
        let buyPressureRatio, sellPressureRatio;    
        if (currentPrice > previousPrice) {    
          buyPressureRatio = ((buyPressure / totalPressure) * 100 * 2.0).toFixed(1);    
          sellPressureRatio = ((sellPressure / totalPressure) * 100 * 0.3).toFixed(1);    
        } else if (currentPrice < previousPrice) {    
          buyPressureRatio = ((buyPressure / totalPressure) * 100 * 0.3).toFixed(1);    
          sellPressureRatio = ((sellPressure / totalPressure) * 100 * 2.0).toFixed(1);    
        } else {    
          buyPressureRatio = ((buyPressure / totalPressure) * 100).toFixed(1);    
          sellPressureRatio = ((sellPressure / totalPressure) * 100).toFixed(1);    
        }    
    
        const totalRatio = parseFloat(buyPressureRatio) + parseFloat(sellPressureRatio);    
        if (totalRatio > 0) {    
          buyPressureRatio = ((parseFloat(buyPressureRatio) / totalRatio) * 100).toFixed(1);    
          sellPressureRatio = ((parseFloat(sellPressureRatio) / totalRatio) * 100).toFixed(1);    
        }    
    
        const buyPressureText = (isEnglish ? lang.en.buyPressure : lang.ar.buyPressure) + buyPressureRatio + "%";    
        const sellPressureText = (isEnglish ? lang.en.sellPressure : lang.ar.sellPressure) + sellPressureRatio + "%";    
    
        document.getElementById("pressure").innerHTML = `<div class="buy">${buyPressureText}</div><div class="sell">${sellPressureText}</div>`;    
    
        // Add Alert for Potential Price Increase    
        const alertDiv = document.getElementById("alert");    
        if (currentPrice < previousPrice && parseFloat(buyPressureRatio) >= 70 && parseFloat(sellPressureRatio) <= 30) {    
          alertDiv.className = "alert-bullish";    
          alertDiv.innerText = isEnglish ? lang.en.bullishAlert : lang.ar.bullishAlert;    
        } else {    
          alertDiv.className = "";    
          alertDiv.innerText = "";    
        }    
      } catch (err) {    
        console.error(`خطأ في جلب دفتر الطلبات أو التداولات لـ ${pair}:`, err);    
      }    
    }    
    
    async function fetchRatios(pair) {    
      const intervals = ["1m", "15m", "1h", "4h", "1d"];    
      let table = '<table><tr><th>' + (isEnglish ? "Interval" : "الفترة") + '</th><th class="buy">' + (isEnglish ? "Buy %" : "شراء %") + '</th><th class="sell">' + (isEnglish ? "Sell %" : "بيع %") + '</th></tr>';    
    
      for (let interval of intervals) {    
        try {    
          const res = await fetch(`https://api.binance.com/api/v1/klines?symbol=${pair}&interval=${interval}&limit=50`);    
          const data = await res.json();    
    
          let buy = 0, sell = 0;    
          for (let kline of data) {    
            const open = parseFloat(kline[1]);    
            const close = parseFloat(kline[4]);    
            if (close > open) buy++;    
            else if (close < open) sell++;    
          }    
    
          const total = buy + sell || 1;    
          const buyRatio = ((buy / total) * 100).toFixed(1);    
          const sellRatio = ((sell / total) * 100).toFixed(1);    
          table += `<tr><td>${interval}</td><td class="buy">${buyRatio}%</td><td class="sell">${sellRatio}%</td></tr>`;    
        } catch (err) {    
          console.error(`خطأ في جلب نسب الشراء/البيع لـ ${pair} على فترة ${interval}:`, err);    
        }    
      }    
    
      table += '</table>';    
      document.getElementById("ratios").innerHTML = table;    
    }    
    
    async function checkOversoldBreakout() {    
      try {    
        const interval = "1h";    
        const res = await fetch('https://api.binance.com/api/v3/exchangeInfo');    
        const exchangeInfo = await res.json();    
        const usdtPairs = exchangeInfo.symbols    
          .filter(s => s.symbol.endsWith('USDT') && s.status === 'TRADING')    
          .map(s => s.symbol);    
    
        let coinsAdded = 0;    
        for (let pair of usdtPairs) {    
          try {    
            const klineRes = await fetch(`https://api.binance.com/api/v1/klines?symbol=${pair}&interval=${interval}&limit=3`);    
            const klines = await klineRes.json();    
            if (klines.length < 3) {    
              console.warn(`بيانات غير كافية لـ ${pair}: عدد الشموع ${klines.length}`);    
              continue;    
            }    
    
            const prevPrevClose = parseFloat(klines[0][4]);    
            const prevClose = parseFloat(klines[1][4]);    
            const currentClose = parseFloat(klines[2][4]);    
            const currentVolume = parseFloat(klines[2][5]);    
    
            if (currentClose >= 1) {    
              console.log(`تخطي ${pair}: السعر (${currentClose}) أكبر من أو يساوي 1 دولار`);    
              continue;    
            }    
    
            const priceRes = await fetch(`https://api.binance.com/api/v1/klines?symbol=${pair}&interval=${interval}&limit=100`);    
            const priceData = await priceRes.json();    
            if (priceData.length < 100) {    
              console.warn(`بيانات غير كافية (أقل من 100 شمعة) لـ ${pair}: عدد الشموع ${priceData.length}`);    
              continue;    
            }    
            const prices = priceData.map(d => parseFloat(d[4]));    
            const volumes = priceData.slice(-10).map(d => parseFloat(d[5]));    
            const maxPrice = Math.max(...prices);    
            const minPrice = Math.min(...prices);    
            const oversold = minPrice;    
            const avgVolume = volumes.reduce((sum, v) => sum + v, 0) / volumes.length;    
    
            if (prevClose <= oversold && currentClose >= oversold && prevPrevClose <= oversold) {    
              const breakoutRatio = ((currentClose - oversold) / oversold * 100);    
              if (breakoutRatio >= 0.30 && breakoutRatio <= 0.60 && currentVolume > avgVolume) {    
                const coin = pair.replace('USDT', '');    
                console.log(`اختراق صادق مكتشف لـ ${coin}: السعر السابق=${prevClose}, السعر الحالي=${currentClose}, oversold=${oversold}, نسبة الاختراق=${breakoutRatio}%, الحجم=${currentVolume}, متوسط الحجم=${avgVolume}`);    
                if (!breakoutCoins.some(c => c.coin === coin)) {    
                  const timestamp = Date.now();    
                  breakoutCoins.push({ coin, price: currentClose, timestamp, isFavorite: false });    
                  coinsAdded++;    
                  console.log(`تمت إضافة ${coin} إلى القائمة. العدد الإجمالي: ${breakoutCoins.length}`);    
                } else {    
                  breakoutCoins = breakoutCoins.map(c => c.coin === coin ? { ...c, price: currentClose, timestamp: Date.now() } : c);    
                  console.log(`تم تحديث ${coin} في القائمة.`);    
                }    
              } else {    
                console.log(`تخطي ${pair}: نسبة الاختراق (${breakoutRatio}%) خارج النطاق [0.30%, 0.60%] أو حجم التداول (${currentVolume}) أقل من المتوسط (${avgVolume})`);    
              }    
            } else {    
              console.log(`تخطي ${pair}: لم يتم اختراق خط التشبع البيعي (prevClose=${prevClose}, currentClose=${currentClose}, oversold=${oversold})`);    
            }    
          } catch (err) {    
            console.error(`خطأ في معالجة ${pair}:`, err);    
          }    
        }    
        const sixHours = 6 * 60 * 60 * 1000;    
        breakoutCoins = breakoutCoins.filter(c => Date.now() - c.timestamp <= sixHours);    
        localStorage.setItem('breakoutCoins', JSON.stringify(breakoutCoins));    
        console.log(`تم حفظ ${breakoutCoins.length} عملة في localStorage بعد إزالة العملات القديمة.`);    
        updateBreakoutCoinsTable();    
        console.log(`تم تحديث الجدول. عدد العملات المضافة في هذه الدورة: ${coinsAdded}`);    
      } catch (err) {    
        console.error("خطأ في فحص الاختراق:", err);    
      }    
    }    
    
    function updateBreakoutCoinsTable() {    
      const l = isEnglish ? lang.en : lang.ar;    
      let table = '<table><tr><th>' + l.coin + '</th><th>' + l.price + '</th><th>' + l.action + '</th></tr>';    
      if (breakoutCoins.length === 0) {    
        table += `<tr><td colspan="3">${isEnglish ? "No coins detected yet." : "لم يتم اكتشاف عملات بعد."}</td></tr>`;    
      } else {    
        breakoutCoins.forEach((c, index) => {    
          const favoriteText = c.isFavorite ? l.unfavorite : l.favorite;    
          table += `<tr><td>${c.coin}</td><td>${c.price.toFixed(6)}</td><td>` +    
                   `<button onclick="toggleFavorite(${index})">${favoriteText}</button>` +    
                   `<button onclick="deleteBreakoutCoin(${index})">${l.delete}</button></td></tr>`;    
        });    
      }    
      table += '</table>';    
      document.getElementById("breakoutCoins").innerHTML = table;    
      console.log(`تم تحديث الجدول المرئي. عدد العملات المعروضة: ${breakoutCoins.length}`);    
    }    
    
    function deleteBreakoutCoin(index) {    
      const deletedCoin = breakoutCoins[index].coin;    
      breakoutCoins.splice(index, 1);    
      localStorage.setItem('breakoutCoins', JSON.stringify(breakoutCoins));    
      updateBreakoutCoinsTable();    
      console.log(`تم حذف ${deletedCoin} من القائمة. العدد المتبقي: ${breakoutCoins.length}`);    
    }    
    
    function toggleFavorite(index) {    
      breakoutCoins[index].isFavorite = !breakoutCoins[index].isFavorite;    
      localStorage.setItem('breakoutCoins', JSON.stringify(breakoutCoins));    
      updateBreakoutCoinsTable();    
      console.log(`تم تغيير حالة المفضلة لـ ${breakoutCoins[index].coin}`);    
    }    
    
    fetchChart();    
    updateInterval = setInterval(fetchChart, 5000);    
    checkOversoldBreakout();    
    setInterval(checkOversoldBreakout, 30000);    
  </script>    
</body>    
</html>
