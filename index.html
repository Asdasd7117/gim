<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crypto Chart with RSI</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
      text-align: center;
      padding: 20px;
    }
    #chart-container {
      position: relative;
      height: 500px;
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fff;
    }
    select, input, button {
      margin: 10px;
      padding: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h2>Interactive Crypto Chart with RSI</h2>
  <input type="text" id="symbolInput" placeholder="Enter symbol e.g., BTC" />
  <select id="intervalSelect">
    <option value="1m">1 Minute</option>
    <option value="15m">15 Minutes</option>
    <option value="1h">1 Hour</option>
    <option value="4h">4 Hours</option>
    <option value="1d">1 Day</option>
  </select>
  <button onclick="updateChart()">Search</button>
  <div id="chart-container">
    <canvas id="cryptoChart"></canvas>
  </div>

  <script>
    let chart;
    let currentSymbol = 'BTCUSDT';
    let currentInterval = '1m';

    async function fetchData(symbol, interval) {
      const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=100`);
      const data = await response.json();
      return data.map(d => ({ time: new Date(d[0]), close: parseFloat(d[4]) }));
    }

    function calculateRSI(prices, period = 14) {
      const gains = [];
      const losses = [];
      for (let i = 1; i < prices.length; i++) {
        const diff = prices[i] - prices[i - 1];
        if (diff >= 0) {
          gains.push(diff);
          losses.push(0);
        } else {
          gains.push(0);
          losses.push(-diff);
        }
      }

      const avgGain = [average(gains.slice(0, period))];
      const avgLoss = [average(losses.slice(0, period))];

      for (let i = period; i < gains.length; i++) {
        avgGain.push((avgGain[avgGain.length - 1] * (period - 1) + gains[i]) / period);
        avgLoss.push((avgLoss[avgLoss.length - 1] * (period - 1) + losses[i]) / period);
      }

      const rsi = avgGain.map((gain, i) => {
        const loss = avgLoss[i];
        const rs = loss === 0 ? 100 : gain / loss;
        return 100 - (100 / (1 + rs));
      });

      return new Array(period).fill(null).concat(rsi);
    }

    function average(arr) {
      const valid = arr.filter(n => !isNaN(n));
      return valid.reduce((a, b) => a + b, 0) / valid.length;
    }

    async function drawChart() {
      const data = await fetchData(currentSymbol, currentInterval);
      const labels = data.map(d => d.time.toLocaleTimeString());
      const prices = data.map(d => d.close);
      const rsi = calculateRSI(prices);

      const ctx = document.getElementById('cryptoChart').getContext('2d');
      if (chart) chart.destroy();

      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: `${currentSymbol} Price`,
              data: prices,
              yAxisID: 'y',
              borderColor: '#333',
              backgroundColor: 'rgba(0,0,0,0.05)',
              pointRadius: 0,
              fill: false,
              tension: 0.4
            },
            {
              label: 'RSI',
              data: rsi,
              yAxisID: 'rsi',
              borderColor: 'blue',
              borderWidth: 1.5,
              pointRadius: 0,
              tension: 0.4
            },
            {
              label: 'Overbought (70)',
              data: new Array(labels.length).fill(70),
              yAxisID: 'rsi',
              borderColor: 'green',
              borderDash: [5, 5],
              pointRadius: 0,
              borderWidth: 1
            },
            {
              label: 'Oversold (30)',
              data: new Array(labels.length).fill(30),
              yAxisID: 'rsi',
              borderColor: 'red',
              borderDash: [5, 5],
              pointRadius: 0,
              borderWidth: 1
            }
          ]
        },
        options: {
          responsive: true,
          interaction: {
            mode: 'index',
            intersect: false
          },
          scales: {
            y: {
              position: 'left',
              title: {
                display: true,
                text: 'Price'
              },
              beginAtZero: false
            },
            rsi: {
              position: 'right',
              min: 0,
              max: 100,
              title: {
                display: true,
                text: 'RSI'
              },
              grid: {
                drawOnChartArea: false
              }
            }
          }
        }
      });
    }

    function updateChart() {
      const input = document.getElementById('symbolInput').value.toUpperCase();
      const interval = document.getElementById('intervalSelect').value;
      currentSymbol = input.includes('USDT') ? input : input + 'USDT';
      currentInterval = interval;
      drawChart();
    }

    setInterval(drawChart, 10000);
    drawChart();
  </script>
</body>
</html>
