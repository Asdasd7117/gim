<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <title>क्रिप्टोकरेंसी में तेजी की निगरानी</title>
  <style>
    body {
      direction: ltr;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f0f0f0;
      margin: 0;
      padding: 20px;
    }
    h2 {
      color: #333;
    }
    #status {
      font-size: 18px;
      color: #333;
      margin: 10px 0;
    }
    #coins {
      max-width: 600px;
      margin: 20px auto;
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 10px;
      background: #fff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 8px;
      border: 1px solid #ddd;
      text-align: center;
    }
    th {
      background-color: #4CAF50;
      color: white;
    }
    tr:nth-child(even) {
      background-color: #f2f2f2;
    }
    .bullish {
      background-color: rgba(0, 255, 0, 0.1);
    }
    .error {
      color: red;
      font-weight: bold;
      margin: 10px;
    }
  </style>
</head>
<body>
  <h2>USDT के मुकाबले क्रिप्टोकरेंसी में तेजी की निगरानी</h2>
  <div id="status">स्थिति: सिक्कों की निगरानी चल रही है</div>
  <div id="error"></div>
  <div id="coins">
    <h3>तेजी की संभावना वाली कैंडल वाली मुद्राएं (समय-सीमा: 1 घंटा)</h3>
    <table>
      <thead>
        <tr>
          <th>मुद्रा</th>
          <th>मूल्य (डॉलर)</th>
          <th>कैंडल पैटर्न</th>
          <th>ट्रेडिंग वॉल्यूम (सापेक्ष)</th>
        </tr>
      </thead>
      <tbody id="coinTable"></tbody>
    </table>
  </div>

  <script>
    let allCoins = [];
    let bullishCoins = [];
    const VOLUME_THRESHOLD = 1.5; // ट्रेडिंग वॉल्यूम ≥ 1.5x औसत

    const lang = {
      hi: {
        statusRunning: "स्थिति: सिक्कों की निगरानी चल रही है",
        errorNoData: "त्रुटि: पर्याप्त डेटा नहीं।",
        noCoins: "कोई तेजी की संभावना वाली मुद्रा नहीं",
        hammer: "हथौड़ा",
        bullishEngulfing: "बुलिश एंगुलफिंग"
      },
      en: {
        statusRunning: "Status: Monitoring coins",
        errorNoData: "Error: Not enough data.",
        noCoins: "No coins with bullish breakout",
        hammer: "Hammer",
        bullishEngulfing: "Bullish Engulfing"
      }
    };
    let isEnglish = false;

    function toggleLang() {
      isEnglish = !isEnglish;
      updateStatus();
      updateCoinsDisplay();
    }

    function updateStatus() {
      const statusDiv = document.getElementById('status');
      statusDiv.innerText = isEnglish ? lang.en.statusRunning : lang.hi.statusRunning;
    }

    async function fetchAllCoins() {
      try {
        const res = await fetch('https://api.binance.com/api/v3/ticker/price');
        if (!res.ok) throw new Error('Failed to fetch prices');
        const data = await res.json();
        allCoins = data
          .filter(t => t.symbol.endsWith('USDT'))
          .map(t => ({ symbol: t.symbol, price: parseFloat(t.price) }));
      } catch (err) {
        console.error('सिक्के प्राप्त करने में त्रुटि:', err);
        document.getElementById('error').innerText = isEnglish ? lang.en.errorNoData : lang.hi.errorNoData;
      }
    }

    async function calculateVolume(symbol) {
      try {
        const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1h&limit=24`);
        if (!res.ok) return null;
        const data = await res.json();
        if (data.length < 24) return null;

        const volumes = data.map(d => parseFloat(d[5]));
        const avgVolume = volumes.reduce((sum, vol) => sum + vol, 0) / volumes.length;
        const currentVolume = volumes[volumes.length - 1];
        const volumeRatio = currentVolume / avgVolume;
        return volumeRatio;
      } catch (err) {
        console.error(`${symbol} के लिए ट्रेडिंग वॉल्यूम की गणना में त्रुटि:`, err);
        return null;
      }
    }

    async function detectCandlestickPattern(symbol) {
      try {
        const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1h&limit=2`);
        if (!res.ok) return null;
        const data = await res.json();
        if (data.length < 2) return null;

        const [prevCandle, currentCandle] = data;
        const open = parseFloat(currentCandle[1]);
        const high = parseFloat(currentCandle[2]);
        const low = parseFloat(currentCandle[3]);
        const close = parseFloat(currentCandle[4]);
        const body = Math.abs(close - open);
        const upperShadow = high - Math.max(open, close);
        const lowerShadow = Math.min(open, close) - low;

        // Hammer
        const isHammer = lowerShadow > 2 * body && upperShadow < 0.3 * body && close > open;
        // Bullish Engulfing
        const prevOpen = parseFloat(prevCandle[1]);
        const prevClose = parseFloat(prevCandle[4]);
        const isBullishEngulfing = prevClose < prevOpen && close > open && open <= prevClose && close >= prevOpen;

        if (isHammer) return 'hammer';
        if (isBullishEngulfing) return 'bullishEngulfing';
        return null;
      } catch (err) {
        console.error(`${symbol} के लिए कैंडल पैटर्न का पता लगाने में त्रुटि:`, err);
        return null;
      }
    }

    async function monitorCoins() {
      await fetchAllCoins();
      if (!allCoins.length) return;

      bullishCoins = [];
      for (const coin of allCoins) {
        try {
          const volumeRatio = await calculateVolume(coin.symbol);
          const pattern = await detectCandlestickPattern(coin.symbol);

          if (volumeRatio !== null && volumeRatio >= VOLUME_THRESHOLD && pattern) {
            bullishCoins.push({
              symbol: coin.symbol,
              price: coin.price,
              pattern: pattern,
              volumeRatio: volumeRatio
            });
          }
        } catch (err) {
          console.error(`${coin.symbol} की निगरानी में त्रुटि:`, err);
        }
      }
      updateCoinsDisplay();
    }

    function updateCoinsDisplay() {
      const coinTable = document.getElementById('coinTable');
      let html = '';
      if (bullishCoins.length === 0) {
        html = `<tr><td colspan="4">${isEnglish ? lang.en.noCoins : lang.hi.noCoins}</td></tr>`;
      } else {
        bullishCoins.forEach(coin => {
          const patternLabel = coin.pattern === 'hammer' ? (isEnglish ? lang.en.hammer : lang.hi.hammer) : (isEnglish ? lang.en.bullishEngulfing : lang.hi.bullishEngulfing);
          html += `
            <tr class="bullish">
              <td>${coin.symbol}</td>
              <td>${coin.price.toFixed(4)}</td>
              <td>${patternLabel}</td>
              <td>${coin.volumeRatio.toFixed(2)}x</td>
            </tr>
          `;
        });
      }
      coinTable.innerHTML = html;
    }

    // पेज लोड होने पर निगरानी शुरू करें
    monitorCoins();
    setInterval(monitorCoins, 10000); // हर 10 सेकंड में जांच करें
  </script>
</body>
</html>
