<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>الرسم البياني الاحترافي</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
  <style>
    body {
      direction: rtl;
      font-family: Arial;
      text-align: center;
      background: #f0f0f0;
    }
    canvas {
      background: linear-gradient(to top, rgba(255, 0, 0, 0.15) 50%, rgba(0, 255, 0, 0.15) 50%);
      border: 1px solid #ccc;
      margin: 20px auto;
      display: block;
    }
    select, input[type=text], button {
      padding: 10px;
      margin: 10px;
      font-size: 16px;
    }
    #priceLabel {
      font-size: 20px;
      color: #000;
      margin-top: -10px;
    }
    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 90%;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      font-size: 14px;
    }
    th {
      background-color: #333;
      color: white;
    }
    .buy {
      background-color: rgba(0, 255, 0, 0.2);
    }
    .sell {
      background-color: rgba(255, 0, 0, 0.2);
    }
    #alerts {
      margin-top: 30px;
      width: 90%;
      margin: auto;
    }
    .alert-item {
      background: #fff;
      margin: 10px 0;
      padding: 10px;
      border: 1px solid #ccc;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>
<body>
  <button onclick="toggleLang()">ENGLISH</button>
  <h2 id="title">الرسم البياني للعملة</h2>
  <input type="text" id="symbol" placeholder="مثال: BTC" />
  <select id="interval" onchange="fetchChart()">
    <option value="1m">1 دقيقة</option>
    <option value="15m">15 دقيقة</option>
    <option value="1h" selected>1 ساعة</option>
    <option value="4h">4 ساعات</option>
    <option value="1d">1 يوم</option>
  </select>
  <button onclick="fetchChart()" id="searchBtn">بحث</button>
  <div id="priceLabel">السعر الحالي: --</div>
  <canvas id="chart" width="900" height="400"></canvas>
  <div id="breakout"></div>
  <h3 id="orderbookTitle">إجمالي المشترين والبائعين</h3>
  <div id="orderbook"></div>
  <h3 id="ratiosTitle">نسبة الشراء والبيع (٪)</h3>
  <div id="ratios"></div>

  <h3>تنبيهات العملات المخترقة لخط التشبع البيعي</h3>
  <div id="alerts"></div>

  <script>
    let alerts = [];
    async function checkBreakout() {
      const res = await fetch("https://api.binance.com/api/v3/ticker/price");
      const tickers = await res.json();
      for (let ticker of tickers) {
        if (!ticker.symbol.endsWith("USDT")) continue;
        const price = parseFloat(ticker.price);
        if (price > 1) continue;
        const resKline = await fetch(`https://api.binance.com/api/v1/klines?symbol=${ticker.symbol}&interval=15m&limit=30`);
        const data = await resKline.json();
        const prices = data.map(d => parseFloat(d[4]));
        const maxPrice = Math.max(...prices);
        const minPrice = Math.min(...prices);
        const oversold = minPrice + (maxPrice - minPrice) * 0.1;
        const breakoutLevel = oversold + oversold * 0.0005; // 0.05%
        const latestPrice = prices[prices.length - 1];

        if (latestPrice > breakoutLevel && !alerts.find(a => a.symbol === ticker.symbol)) {
          alerts.push({ symbol: ticker.symbol, price: latestPrice });
          renderAlerts();
        }
      }
    }

    function renderAlerts() {
      const container = document.getElementById("alerts");
      container.innerHTML = alerts.map((a, i) => `
        <div class="alert-item">
          <div>${a.symbol} - ${a.price.toFixed(4)}</div>
          <button onclick="removeAlert(${i})">حذف</button>
        </div>
      `).join("");
    }

    function removeAlert(index) {
      alerts.splice(index, 1);
      renderAlerts();
    }

    setInterval(checkBreakout, 60000 * 3); // كل 3 دقائق
  </script>
</body>
</html>
