<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Chart</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
      text-align: center;
      padding: 20px;
    }
    #chart-container {
      position: relative;
      height: 400px;
      width: 100%;
      background: linear-gradient(to top, rgba(255,0,0,0.1) 50%, rgba(0,255,0,0.1) 50%);
      border: 1px solid #ddd;
      border-radius: 10px;
    }
    select, input, button {
      margin: 10px;
      padding: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h2>Interactive Crypto Chart</h2>
  <input type="text" id="symbolInput" placeholder="Enter symbol e.g., BTC" />
  <select id="intervalSelect">
    <option value="1m">1 Minute</option>
    <option value="15m">15 Minutes</option>
    <option value="1h">1 Hour</option>
    <option value="4h">4 Hours</option>
    <option value="1d">1 Day</option>
  </select>
  <button onclick="updateChart()">Search</button>
  <div id="chart-container">
    <canvas id="cryptoChart"></canvas>
  </div>

  <script>
    let chart;
    let currentSymbol = 'BTCUSDT';
    let currentInterval = '1m';

    async function fetchData(symbol, interval) {
      const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=100`);
      const data = await response.json();
      return data.map(d => ({ time: new Date(d[0]), price: parseFloat(d[4]) }));
    }

    async function drawChart() {
      const symbol = currentSymbol;
      const interval = currentInterval;
      const data = await fetchData(symbol, interval);
      const labels = data.map(d => d.time.toLocaleTimeString());
      const prices = data.map(d => d.price);

      const ctx = document.getElementById('cryptoChart').getContext('2d');

      if (chart) chart.destroy();

      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: `${symbol} Price`,
            data: prices,
            borderColor: '#000',
            backgroundColor: prices.map(p => p >= prices[0] ? 'rgba(0,255,0,0.2)' : 'rgba(255,0,0,0.2)'),
            pointBackgroundColor: prices.map(p => p >= prices[0] ? 'green' : 'red'),
            fill: true,
            tension: 0.3,
          }]
        },
        options: {
          responsive: true,
          scales: {
            y: {
              beginAtZero: false
            }
          }
        }
      });
    }

    function updateChart() {
      const input = document.getElementById('symbolInput').value.toUpperCase();
      const interval = document.getElementById('intervalSelect').value;
      currentSymbol = input.includes('USDT') ? input : input + 'USDT';
      currentInterval = interval;
      drawChart();
    }

    setInterval(() => drawChart(), 10000);
    drawChart();
  </script>
</body>
</html>
